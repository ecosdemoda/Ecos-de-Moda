<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecos de Moda — Tienda de Regalos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { cream: '#FFF8F0', bark: '#2D2016', copper: '#C8956C', gold: '#E8B86D', sand: '#E8D5C4', drift: '#8B7355', admin: '#111827', adminCard: '#1F2937' },
          fontFamily: { display: ['Playfair Display', 'serif'], body: ['Lato', 'sans-serif'] }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root { --bg: #FFF8F0; --fg: #2D2016; --accent: #C8956C; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Lato', sans-serif; background: var(--bg); color: var(--fg); overflow-x: hidden; }
    .font-display { font-family: 'Playfair Display', serif; }
    .float-shape { position: absolute; border-radius: 50%; opacity: 0.12; pointer-events: none; animation: floatUp 8s ease-in-out infinite; }
    @keyframes floatUp { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-30px) scale(1.05); } }
    .product-card { transition: transform 0.3s, box-shadow 0.3s; }
    .product-card:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(45,32,22,0.12); }
    .product-card .card-img { transition: transform 0.5s; }
    .product-card:hover .card-img { transform: scale(1.08); }
    .tab-btn { transition: all 0.3s; border-bottom: 3px solid transparent; }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }
    .nav-scrolled { background: rgba(255,248,240,0.95) !important; backdrop-filter: blur(12px); box-shadow: 0 2px 20px rgba(45,32,22,0.08); }
    .modal-overlay { position: fixed; inset: 0; z-index: 1100; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .modal-overlay.visible { opacity: 1; pointer-events: all; }
    .modal-box { transform: translateY(20px); transition: transform 0.3s; width: 95%; max-width: 500px; }
    .modal-overlay.visible .modal-box { transform: translateY(0); }
    
    /* Panel Admin Responsive */
    #adminPanel { position: fixed; inset: 0; z-index: 1050; transform: translateX(100%); transition: transform 0.4s; pointer-events: none; }
    #adminPanel.open { transform: translateX(0); pointer-events: all; }
    #adminSidebar { transition: transform 0.3s; z-index: 60; }
    @media (max-width: 767px) {
      #adminSidebar { position: fixed; top: 0; left: 0; bottom: 0; transform: translateX(-100%); }
      #adminSidebar.open { transform: translateX(0); }
      #sidebarOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; }
      #sidebarOverlay.active { display: block; }
    }

    .toast { position: fixed; bottom: 30px; right: 30px; z-index: 2000; padding: 14px 24px; border-radius: 12px; color: #fff; font-weight: 600; transform: translateY(100px); opacity: 0; transition: all 0.4s; pointer-events: none; max-width: 90%; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #16a34a; } .toast.error { background: #dc2626; } .toast.info { background: #C8956C; }
    .reveal { opacity: 0; transform: translateY(40px); transition: opacity 0.7s, transform 0.7s; } .reveal.visible { opacity: 1; transform: translateY(0); }
    .admin-scroll::-webkit-scrollbar { width: 6px; } .admin-scroll::-webkit-scrollbar-thumb { background: #4B5563; border-radius: 3px; }
    .admin-fab { position: fixed; bottom: 28px; left: 28px; z-index: 1000; padding: 14px 22px; border-radius: 50px; background: linear-gradient(135deg, #C8956C, #E8B86D); color: #fff; border: none; cursor: pointer; box-shadow: 0 4px 24px rgba(200,149,108,0.5); transition: transform 0.3s; display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 14px; }
    .admin-fab:hover { transform: scale(1.05); }
    .pattern-bg { background-image: radial-gradient(circle at 20% 80%, rgba(200,149,108,0.06) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(232,184,109,0.06) 0%, transparent 50%); }
    .admin-ribbon { position: fixed; top: 80px; left: 28px; z-index: 999; background: #16a34a; color: #fff; padding: 6px 16px; border-radius: 8px; font-size: 12px; font-weight: 700; display: none; }
    .admin-ribbon.show { display: flex; align-items: center; gap: 6px; }
  </style>
</head>
<body>

  <nav id="mainNav" class="fixed top-0 left-0 right-0 z-50 transition-all">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="#heroSection" class="font-display text-2xl font-bold tracking-tight" id="navTitle" style="color:var(--fg)">Ecos de Moda</a>
      <div class="hidden md:flex items-center gap-8">
        <a href="#heroSection" class="text-sm font-semibold tracking-wide uppercase hover:text-copper transition-colors">Inicio</a>
        <a href="#catalogSection" class="text-sm font-semibold tracking-wide uppercase hover:text-copper transition-colors">Catálogo</a>
      </div>
    </div>
  </nav>

  <main id="publicSite">
    <section id="heroSection" class="relative min-h-screen flex items-center justify-center overflow-hidden pattern-bg">
      <div class="float-shape w-40 h-40 bg-copper" style="top:10%;left:8%"></div>
      <div class="float-shape w-24 h-24 bg-gold" style="top:60%;left:15%"></div>
      <div class="float-shape w-32 h-32 bg-drift" style="top:20%;right:10%"></div>
      <div class="relative z-10 text-center px-6 max-w-4xl">
        <p id="heroSubtitle" class="text-drift uppercase tracking-[0.3em] text-sm mb-4 font-semibold">Regalos con alma</p>
        <h1 id="heroTitle" class="font-display text-5xl md:text-7xl lg:text-8xl font-black leading-tight mb-6" style="color:var(--fg)">Cada regalo cuenta una historia</h1>
        <a href="#catalogSection" class="inline-block px-10 py-4 rounded-full font-bold text-white text-lg transition-all hover:shadow-lg hover:scale-105" style="background:var(--accent)">Ver Catálogo</a>
      </div>
    </section>

    <section id="catalogSection" class="py-20 px-6 pattern-bg">
      <div class="max-w-7xl mx-auto">
        <div class="text-center mb-12 reveal">
          <h2 class="font-display text-4xl md:text-5xl font-bold mb-4" style="color:var(--fg)">Nuestro Catálogo</h2>
        </div>
        <div id="sectionTabs" class="flex flex-wrap justify-center gap-2 mb-10 reveal"></div>
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 reveal"></div>
      </div>
    </section>
  </main>

  <footer class="py-10 px-6 text-center" style="background:var(--fg)">
    <p id="footerName" class="font-display text-cream text-xl font-bold mb-2">Ecos de Moda</p>
  </footer>

  <button class="admin-fab" id="adminFab"><i class="fas fa-lock"></i> <span>Admin</span></button>
  <div class="admin-ribbon" id="adminRibbon"><i class="fas fa-check-circle"></i> Admin</div>

  <!-- MODAL LOGIN -->
  <div id="loginModal" class="modal-overlay">
    <div class="modal-box bg-white rounded-2xl p-8 mx-4 shadow-2xl">
      <h3 class="font-display text-2xl font-bold text-bark mb-4 text-center">Acceso Admin</h3>
      <div class="space-y-4">
        <input id="loginUser" type="email" class="w-full px-4 py-4 rounded-xl border border-sand outline-none text-lg" placeholder="Email">
        <input id="loginPass" type="password" class="w-full px-4 py-4 rounded-xl border border-sand outline-none text-lg" placeholder="Contraseña">
        <p id="loginError" class="text-red-500 text-sm hidden">Credenciales incorrectas</p>
        <button id="loginBtn" class="w-full py-4 rounded-xl font-bold text-white text-lg" style="background:var(--accent)">Iniciar Sesión</button>
        <button id="loginCancel" class="w-full py-4 rounded-xl font-bold text-drift border border-sand">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- MODAL PRODUCTO -->
  <div id="productModal" class="modal-overlay">
    <div class="modal-box bg-white rounded-2xl p-6 mx-4 shadow-2xl max-h-[90vh] overflow-y-auto">
      <h3 id="productModalTitle" class="font-display text-2xl font-bold text-bark mb-6">Producto</h3>
      <input type="hidden" id="pm_sectionId"><input type="hidden" id="pm_productId">
      <div class="space-y-4">
        <div><label class="block text-sm font-bold text-bark mb-1">Nombre</label><input id="pm_name" type="text" class="w-full px-4 py-3 rounded-xl border border-sand outline-none"></div>
        <div><label class="block text-sm font-bold text-bark mb-1">Precio (€)</label><input id="pm_price" type="number" step="0.01" class="w-full px-4 py-3 rounded-xl border border-sand outline-none"></div>
        <div><label class="block text-sm font-bold text-bark mb-2">Imagen (URL)</label><input id="pm_imageUrl" type="url" class="w-full px-4 py-3 rounded-xl border border-sand outline-none" placeholder="https://..."></div>
        <div id="pm_preview" class="w-full h-48 rounded-xl bg-sand/20 border-2 border-dashed border-sand flex items-center justify-center overflow-hidden"><span class="text-drift text-sm">Vista previa</span></div>
        <div class="flex gap-3 pt-2">
          <button id="pm_save" class="flex-1 py-4 rounded-xl font-bold text-white" style="background:var(--accent)">Guardar</button>
          <button id="pm_cancel" class="flex-1 py-4 rounded-xl font-bold text-drift border border-sand">Cancelar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL SECCIÓN -->
  <div id="sectionModal" class="modal-overlay">
    <div class="modal-box bg-white rounded-2xl p-6 mx-4 shadow-2xl">
      <h3 class="font-display text-2xl font-bold text-bark mb-6">Sección</h3>
      <input type="hidden" id="sm_sectionId">
      <div class="space-y-4">
        <div><label class="block text-sm font-bold text-bark mb-1">Nombre</label><input id="sm_name" type="text" class="w-full px-4 py-3 rounded-xl border border-sand outline-none"></div>
        <div><label class="block text-sm font-bold text-bark mb-1">Icono (Font Awesome)</label><input id="sm_icon" type="text" class="w-full px-4 py-3 rounded-xl border border-sand outline-none" placeholder="fas fa-gift"></div>
        <div class="flex gap-3 pt-2">
          <button id="sm_save" class="flex-1 py-4 rounded-xl font-bold text-white" style="background:var(--accent)">Guardar</button>
          <button id="sm_cancel" class="flex-1 py-4 rounded-xl font-bold text-drift border border-sand">Cancelar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- PANEL ADMIN RESPONSIVE -->
  <div id="adminPanel" class="bg-admin text-white flex flex-col md:flex-row">
    
    <!-- Overlay para cerrar menú en móvil -->
    <div id="sidebarOverlay" onclick="window.closeAdminSidebar()"></div>

    <!-- Menú Lateral -->
    <aside id="adminSidebar" class="w-72 bg-admin border-r border-gray-800 flex flex-col shrink-0 h-screen overflow-y-auto admin-scroll">
      <div class="p-6 border-b border-gray-800 flex justify-between items-center">
        <h2 class="font-display text-xl font-bold text-copper">Panel Admin</h2>
        <button onclick="window.closeAdminSidebar()" class="md:hidden text-gray-400 hover:text-white"><i class="fas fa-times text-xl"></i></button>
      </div>
      <nav class="flex-1 p-4 space-y-2">
        <button onclick="window.showAdminPage('dashboard'); window.closeAdminSidebar()" class="admin-nav-btn w-full flex items-center gap-3 px-4 py-4 rounded-xl text-left hover:bg-gray-800 text-gray-300 text-lg" data-page="dashboard"><i class="fas fa-chart-bar w-6 text-center"></i> Dashboard</button>
        <button onclick="window.showAdminPage('sections'); window.closeAdminSidebar()" class="admin-nav-btn w-full flex items-center gap-3 px-4 py-4 rounded-xl text-left hover:bg-gray-800 text-gray-300 text-lg" data-page="sections"><i class="fas fa-layer-group w-6 text-center"></i> Secciones</button>
        <button onclick="window.showAdminPage('products'); window.closeAdminSidebar()" class="admin-nav-btn w-full flex items-center gap-3 px-4 py-4 rounded-xl text-left hover:bg-gray-800 text-gray-300 text-lg" data-page="products"><i class="fas fa-boxes-stacked w-6 text-center"></i> Productos</button>
        <button onclick="window.showAdminPage('appearance'); window.closeAdminSidebar()" class="admin-nav-btn w-full flex items-center gap-3 px-4 py-4 rounded-xl text-left hover:bg-gray-800 text-gray-300 text-lg" data-page="appearance"><i class="fas fa-palette w-6 text-center"></i> Apariencia</button>
      </nav>
      <div class="p-4 border-t border-gray-800">
        <button id="adminLogout" class="w-full flex items-center gap-3 px-4 py-4 rounded-xl text-left hover:bg-red-900/30 text-red-400 text-lg"><i class="fas fa-sign-out-alt w-6 text-center"></i> Cerrar Sesión</button>
      </div>
    </aside>

    <!-- Contenido Principal -->
    <div class="flex-1 h-screen overflow-y-auto admin-scroll">
      <header class="sticky top-0 bg-admin/95 backdrop-blur border-b border-gray-800 px-6 py-4 flex justify-between items-center z-10">
        <div class="flex items-center gap-4">
          <button id="adminMenuToggle" class="md:hidden w-10 h-10 rounded-full hover:bg-gray-800 flex items-center justify-center transition"><i class="fas fa-bars text-xl"></i></button>
          <h2 id="adminPageTitle" class="font-display text-xl font-bold">Dashboard</h2>
        </div>
        <button id="adminClose" class="w-10 h-10 rounded-full hover:bg-gray-800 flex items-center justify-center transition" aria-label="Cerrar panel"><i class="fas fa-times text-xl"></i></button>
      </header>
      <div id="adminContent" class="p-6 md:p-8"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <!-- CÓDIGO FIREBASE Y LÓGICA -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCHQvXHPyZbiqlhMsoDsSqkjrQ5wATj-Cw",
      authDomain: "ecosdemoda-40202.firebaseapp.com",
      projectId: "ecosdemoda-40202",
      storageBucket: "ecosdemoda-40202.firebasestorage.app",
      messagingSenderId: "1077783413744",
      appId: "1:1077783413744:web:bebfb4f7956f6472709335"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let storeData = { sections: [] };
    let isLoggedIn = false;
    let currentAdminPage = 'dashboard';
    let activeSectionTab = 0;
    let adminSelectedSection = 0;

    const DEFAULT_DATA = {
      storeName: 'Ecos de Moda', heroSubtitle: 'Regalos con alma', heroTitle: 'Cada regalo cuenta una historia',
      backgroundColor: '#FFF8F0', headerColor: '#2D2016', accentColor: '#C8956C',
      sections: [
        { id: 1, name: 'Cumpleaños', icon: 'fas fa-birthday-cake', products: [
          { id: 1, name: 'Set de Velas Aromáticas', price: 24.99, image: 'https://picsum.photos/seed/vela01/400/400' },
          { id: 2, name: 'Caja de Chocolates Premium', price: 34.50, image: 'https://picsum.photos/seed/choco02/400/400' }
        ]},
        { id: 2, name: 'Bodas', icon: 'fas fa-ring', products: [
          { id: 3, name: 'Set de Copas Grabadas', price: 65.00, image: 'https://picsum.photos/seed/copas05/400/400' }
        ]},
        { id: 3, name: 'Originales', icon: 'fas fa-star', products: [
          { id: 4, name: 'Mapa Estelar', price: 39.00, image: 'https://picsum.photos/seed/mapa17/400/400' }
        ]}
      ]
    };

    /* === BASE DE DATOS === */
    function initDatabase() {
      onSnapshot(doc(db, "store", "data"), (docSnap) => {
        if (docSnap.exists()) { 
          storeData = docSnap.data(); 
          // SOLUCIÓN CATÁLOGO VACÍO: Si no hay secciones, ponemos las de ejemplo
          if (!storeData.sections || storeData.sections.length === 0) {
            storeData = JSON.parse(JSON.stringify(DEFAULT_DATA));
            saveData();
          }
        } else { 
          storeData = JSON.parse(JSON.stringify(DEFAULT_DATA)); 
          saveData(); 
        }
        applyAppearance(); renderCatalog();
        if (document.getElementById('adminPanel').classList.contains('open')) window.showAdminPage(currentAdminPage);
      });
    }
    async function saveData() { try { await setDoc(doc(db, "store", "data"), storeData); } catch (e) { showToast('Error al guardar: ' + e.message, 'error'); } }

    /* === AUTENTICACIÓN === */
    function initAuth() {
      onAuthStateChanged(auth, (user) => { isLoggedIn = !!user; updateAdminFab(); });
    }
    async function handleLogin() {
      try { await signInWithEmailAndPassword(auth, document.getElementById('loginUser').value, document.getElementById('loginPass').value); closeAllModals(); openAdminPanel(); showToast('Sesión iniciada', 'success'); } 
      catch (e) { document.getElementById('loginError').classList.remove('hidden'); showToast('Credenciales incorrectas', 'error'); }
    }
    async function handleLogout() { await signOut(auth); closeAdminPanel(); showToast('Sesión cerrada', 'info'); }

    /* === INTERFAZ PÚBLICA === */
    function applyAppearance() {
      document.documentElement.style.setProperty('--bg', storeData.backgroundColor);
      document.documentElement.style.setProperty('--fg', storeData.headerColor);
      document.documentElement.style.setProperty('--accent', storeData.accentColor);
      document.body.style.background = storeData.backgroundColor; document.body.style.color = storeData.headerColor;
      document.getElementById('navTitle').textContent = storeData.storeName;
      document.getElementById('heroTitle').textContent = storeData.heroTitle;
      document.getElementById('heroSubtitle').textContent = storeData.heroSubtitle;
      document.getElementById('footerName').textContent = storeData.storeName;
    }

    function renderCatalog() {
      const tabsContainer = document.getElementById('sectionTabs');
      const gridContainer = document.getElementById('productGrid');
      const sections = storeData.sections || [];
      let tabsHtml = `<button class="tab-btn px-4 py-2 text-sm font-semibold rounded-t-lg ${activeSectionTab === -1 ? 'active' : ''}" onclick="window.setActiveTab(-1)">Todos</button>`;
      sections.forEach((sec, i) => { tabsHtml += `<button class="tab-btn px-4 py-2 text-sm font-semibold rounded-t-lg ${activeSectionTab === i ? 'active' : ''}" onclick="window.setActiveTab(${i})"><i class="${sec.icon} mr-1"></i>${sec.name}</button>`; });
      tabsContainer.innerHTML = tabsHtml;
      let productsHtml = '';
      const showSections = activeSectionTab === -1 ? sections : (sections[activeSectionTab] ? [sections[activeSectionTab]] : sections);
      showSections.forEach(sec => {
        if (!sec || !sec.products) return;
        if (activeSectionTab === -1) productsHtml += `<div class="col-span-full mt-6 mb-2"><h3 class="font-display text-2xl font-bold" style="color:var(--fg)"><i class="${sec.icon} mr-2" style="color:var(--accent)"></i>${sec.name}</h3></div>`;
        sec.products.forEach(prod => {
          productsHtml += `<article class="product-card bg-white rounded-2xl overflow-hidden shadow-md border border-sand/50"><div class="overflow-hidden h-56"><img src="${prod.image}" alt="${prod.name}" class="card-img w-full h-full object-cover" loading="lazy" onerror="this.src='https://picsum.photos/seed/fallback/400/400'"></div><div class="p-5"><h4 class="font-display text-lg font-bold text-bark mb-1">${prod.name}</h4><p class="text-xl font-bold" style="color:var(--accent)">${prod.price.toFixed(2)} €</p></div></article>`;
        });
      });
      gridContainer.innerHTML = productsHtml || '<p class="col-span-full text-center text-drift py-12">No hay productos.</p>';
    }
    window.setActiveTab = (i) => { activeSectionTab = i; renderCatalog(); };

    /* === PANEL ADMIN === */
    function openAdminPanel() { document.getElementById('adminPanel').classList.add('open'); document.body.style.overflow = 'hidden'; window.showAdminPage('dashboard'); }
    function closeAdminPanel() { document.getElementById('adminPanel').classList.remove('open'); document.body.style.overflow = ''; window.closeAdminSidebar(); }
    window.openAdminSidebar = () => { document.getElementById('adminSidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('active'); };
    window.closeAdminSidebar = () => { document.getElementById('adminSidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('active'); };
    
    window.showAdminPage = (page) => {
      currentAdminPage = page;
      document.querySelectorAll('.admin-nav-btn').forEach(b => { b.classList.toggle('bg-gray-800', b.dataset.page === page); b.classList.toggle('text-copper', b.dataset.page === page); });
      const titles = { dashboard: 'Dashboard', sections: 'Secciones', products: 'Productos', appearance: 'Apariencia' };
      document.getElementById('adminPageTitle').textContent = titles[page] || page;
      const content = document.getElementById('adminContent');
      if (page === 'dashboard') renderAdminDashboard(content);
      else if (page === 'sections') renderAdminSections(content);
      else if (page === 'products') renderAdminProducts(content);
      else if (page === 'appearance') renderAdminAppearance(content);
    };

    function renderAdminDashboard(el) {
      let total = 0; storeData.sections.forEach(s => total += s.products.length);
      el.innerHTML = `<div class="grid grid-cols-2 gap-4 md:gap-6"><div class="bg-adminCard rounded-2xl p-6 border border-gray-700"><p class="text-gray-400 text-sm md:text-base">Secciones</p><p class="text-3xl font-bold">${storeData.sections.length}</p></div><div class="bg-adminCard rounded-2xl p-6 border border-gray-700"><p class="text-gray-400 text-sm md:text-base">Productos</p><p class="text-3xl font-bold">${total}</p></div></div>`;
    }

    function renderAdminSections(el) {
      let listHtml = '';
      storeData.sections.forEach(s => {
        listHtml += `<div class="bg-adminCard rounded-xl p-4 border border-gray-700 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4"><div class="flex items-center gap-4"><i class="${s.icon} text-copper text-xl"></i><div><span class="font-bold text-lg">${s.name}</span><br class="sm:hidden"><span class="text-gray-400 text-sm">(${s.products.length} productos)</span></div></div><div class="flex gap-2 w-full sm:w-auto"><button onclick="window.openSectionModal(${s.id})" class="flex-1 sm:flex-none px-4 py-3 rounded-lg bg-gray-700 hover:bg-gray-600 text-sm font-bold text-center">Editar</button><button onclick="window.deleteSection(${s.id})" class="flex-1 sm:flex-none px-4 py-3 rounded-lg bg-red-900/30 text-red-400 text-sm font-bold text-center">Eliminar</button></div></div>`;
      });
      el.innerHTML = `<div class="flex justify-between items-center mb-6"><p class="text-gray-400 hidden md:block">Gestiona secciones</p><button onclick="window.openSectionModal()" class="w-full md:w-auto px-5 py-3 rounded-xl font-bold text-white text-lg" style="background:var(--accent)"><i class="fas fa-plus mr-2"></i>Nueva Sección</button></div><div class="space-y-4">${listHtml || '<p class="text-gray-500 text-center py-8">No hay secciones.</p>'}</div>`;
    }

    function renderAdminProducts(el) {
      if (adminSelectedSection >= storeData.sections.length) adminSelectedSection = 0;
      let selectHtml = ''; storeData.sections.forEach((s, i) => { selectHtml += `<option value="${i}" ${adminSelectedSection === i ? 'selected' : ''}>${s.name}</option>`; });
      let productsHtml = '';
      if (storeData.sections.length > 0) {
        const sec = storeData.sections[adminSelectedSection];
        sec.products.forEach(p => { productsHtml += `<div class="bg-adminCard rounded-xl border border-gray-700 overflow-hidden"><img src="${p.image}" class="w-full h-40 object-cover" onerror="this.src='https://picsum.photos/seed/fallback/400/400'"><div class="p-4"><h4 class="font-bold truncate text-lg">${p.name}</h4><p class="text-copper text-xl font-bold mb-3">${p.price.toFixed(2)} €</p><div class="flex gap-2"><button onclick="window.openProductModal(${sec.id}, ${p.id})" class="flex-1 py-3 rounded-lg bg-gray-700 font-bold text-center">Editar</button><button onclick="window.deleteProduct(${sec.id}, ${p.id})" class="flex-1 py-3 rounded-lg bg-red-900/30 text-red-400 font-bold text-center">Eliminar</button></div></div></div>`; });
      }
      el.innerHTML = `<div class="flex flex-col gap-4 mb-6"><select id="adminSectionSelect" class="bg-adminCard border border-gray-700 rounded-xl px-4 py-3 text-white outline-none text-lg w-full">${selectHtml}</select><button onclick="window.openProductModal(${storeData.sections[adminSelectedSection]?.id || 0})" class="w-full px-5 py-3 rounded-xl font-bold text-white text-lg" style="background:var(--accent)"><i class="fas fa-plus mr-2"></i>Nuevo Producto</button></div><div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">${productsHtml || '<p class="col-span-full text-gray-500 text-center py-8">No hay productos.</p>'}</div>`;
      document.getElementById('adminSectionSelect')?.addEventListener('change', function() { adminSelectedSection = parseInt(this.value); window.showAdminPage('products'); });
    }

    function renderAdminAppearance(el) {
      el.innerHTML = `<div class="max-w-2xl space-y-6"><div class="bg-adminCard rounded-2xl p-6 border border-gray-700 space-y-5"><h3 class="font-display text-lg font-bold text-copper">Textos y Colores</h3><div><label class="block text-sm text-gray-400 mb-1">Nombre de la tienda</label><input id="ap_storeName" type="text" value="${storeData.storeName}" class="w-full px-4 py-4 rounded-xl bg-gray-800 border border-gray-600 text-white outline-none text-lg"></div><div><label class="block text-sm text-gray-400 mb-1">Título Hero</label><input id="ap_heroTitle" type="text" value="${storeData.heroTitle}" class="w-full px-4 py-4 rounded-xl bg-gray-800 border border-gray-600 text-white outline-none text-lg"></div><div><label class="block text-sm text-gray-400 mb-1">Subtítulo Hero</label><input id="ap_heroSubtitle" type="text" value="${storeData.heroSubtitle}" class="w-full px-4 py-4 rounded-xl bg-gray-800 border border-gray-600 text-white outline-none text-lg"></div><div class="grid grid-cols-3 gap-4"><div><label class="block text-sm text-gray-400 mb-1">Fondo</label><input id="ap_bgColor" type="color" value="${storeData.backgroundColor}" class="w-full h-14 rounded cursor-pointer bg-transparent border-0"></div><div><label class="block text-sm text-gray-400 mb-1">Texto</label><input id="ap_headerColor" type="color" value="${storeData.headerColor}" class="w-full h-14 rounded cursor-pointer bg-transparent border-0"></div><div><label class="block text-sm text-gray-400 mb-1">Acento</label><input id="ap_accentColor" type="color" value="${storeData.accentColor}" class="w-full h-14 rounded cursor-pointer bg-transparent border-0"></div></div></div><button onclick="window.saveAppearance()" class="w-full px-8 py-4 rounded-xl font-bold text-white text-xl" style="background:var(--accent)">Guardar Apariencia</button></div>`;
    }

    /* === CRUD SECCIONES === */
    window.openSectionModal = (id) => {
      document.getElementById('sm_sectionId').value = id || '';
      const sec = id ? storeData.sections.find(s => s.id === id) : null;
      document.getElementById('sm_name').value = sec ? sec.name : '';
      document.getElementById('sm_icon').value = sec ? sec.icon : 'fas fa-gift';
      openModal('sectionModal');
    };
    window.saveSection = async () => {
      const id = document.getElementById('sm_sectionId').value;
      const name = document.getElementById('sm_name').value.trim();
      const icon = document.getElementById('sm_icon').value.trim() || 'fas fa-gift';
      if (!name) return showToast('El nombre es obligatorio', 'error');
      if (id) { const sec = storeData.sections.find(s => s.id === parseInt(id)); if (sec) { sec.name = name; sec.icon = icon; } } 
      else { storeData.sections.push({ id: Date.now(), name, icon, products: [] }); }
      await saveData(); closeAllModals(); window.showAdminPage('sections'); showToast('Sección guardada', 'success');
    };
    window.deleteSection = async (id) => {
      if (!confirm('¿Eliminar sección y sus productos?')) return;
      storeData.sections = storeData.sections.filter(s => s.id !== id);
      await saveData(); window.showAdminPage('sections'); showToast('Sección eliminada', 'info');
    };

    /* === CRUD PRODUCTOS === */
    window.openProductModal = (secId, prodId) => {
      document.getElementById('pm_sectionId').value = secId;
      document.getElementById('pm_productId').value = prodId || '';
      const sec = storeData.sections.find(s => s.id === secId);
      const prod = prodId ? sec?.products.find(p => p.id === prodId) : null;
      document.getElementById('pm_name').value = prod ? prod.name : '';
      document.getElementById('pm_price').value = prod ? prod.price : '';
      document.getElementById('pm_imageUrl').value = prod ? prod.image : '';
      document.getElementById('pm_preview').innerHTML = prod ? `<img src="${prod.image}" class="w-full h-full object-cover">` : '<span class="text-drift text-sm">Vista previa</span>';
      openModal('productModal');
    };
    window.saveProduct = async () => {
      const secId = parseInt(document.getElementById('pm_sectionId').value);
      const prodId = document.getElementById('pm_productId').value;
      const name = document.getElementById('pm_name').value.trim();
      const price = parseFloat(document.getElementById('pm_price').value);
      const image = document.getElementById('pm_imageUrl').value.trim() || 'https://picsum.photos/seed/' + Date.now() + '/400/400';
      if (!name || isNaN(price)) return showToast('Nombre y precio son obligatorios', 'error');
      const sec = storeData.sections.find(s => s.id === secId); if (!sec) return;
      if (prodId) { const prod = sec.products.find(p => p.id === parseInt(prodId)); if (prod) { prod.name = name; prod.price = price; prod.image = image; } } 
      else { sec.products.push({ id: Date.now(), name, price, image }); }
      await saveData(); closeAllModals(); window.showAdminPage('products'); showToast('Producto guardado', 'success');
    };
    window.deleteProduct = async (secId, prodId) => {
      if (!confirm('¿Eliminar producto?')) return;
      const sec = storeData.sections.find(s => s.id === secId); if (!sec) return;
      sec.products = sec.products.filter(p => p.id !== prodId);
      await saveData(); window.showAdminPage('products'); showToast('Producto eliminado', 'info');
    };

    /* === APARIENCIA === */
    window.saveAppearance = async () => {
      storeData.storeName = document.getElementById('ap_storeName').value.trim() || storeData.storeName;
      storeData.heroTitle = document.getElementById('ap_heroTitle').value.trim();
      storeData.heroSubtitle = document.getElementById('ap_heroSubtitle').value.trim();
      storeData.backgroundColor = document.getElementById('ap_bgColor').value;
      storeData.headerColor = document.getElementById('ap_headerColor').value;
      storeData.accentColor = document.getElementById('ap_accentColor').value;
      await saveData(); showToast('Apariencia guardada', 'success');
    };

    /* === UTILIDADES === */
    function updateAdminFab() { document.getElementById('adminFab').innerHTML = isLoggedIn ? '<i class="fas fa-cog"></i> <span>Admin</span>' : '<i class="fas fa-lock"></i> <span>Admin</span>'; document.getElementById('adminRibbon').classList.toggle('show', isLoggedIn); }
    function openModal(id) { document.getElementById(id).classList.add('visible'); }
    function closeAllModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('visible')); }
    let toastTimer; function showToast(msg, type) { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast ' + type; clearTimeout(toastTimer); setTimeout(() => t.classList.add('show'), 10); toastTimer = setTimeout(() => t.classList.remove('show'), 3500); }

    /* === INICIO === */
    document.addEventListener('DOMContentLoaded', () => {
      initAuth(); initDatabase();
      document.getElementById('adminFab').addEventListener('click', () => isLoggedIn ? openAdminPanel() : openModal('loginModal'));
      document.getElementById('loginBtn').addEventListener('click', handleLogin);
      document.getElementById('loginCancel').addEventListener('click', closeAllModals);
      document.getElementById('adminClose').addEventListener('click', closeAdminPanel);
      document.getElementById('adminLogout').addEventListener('click', handleLogout);
      document.getElementById('adminMenuToggle').addEventListener('click', window.openAdminSidebar);
      document.getElementById('pm_cancel').addEventListener('click', closeAllModals);
      document.getElementById('sm_cancel').addEventListener('click', closeAllModals);
      document.getElementById('pm_save').addEventListener('click', window.saveProduct);
      document.getElementById('sm_save').addEventListener('click', window.saveSection);
      document.getElementById('pm_imageUrl').addEventListener('input', function() { document.getElementById('pm_preview').innerHTML = this.value.trim() ? `<img src="${this.value}" class="w-full h-full object-cover">` : '<span class="text-drift text-sm">Vista previa</span>'; });
      window.addEventListener('scroll', () => { document.getElementById('mainNav').classList.toggle('nav-scrolled', window.scrollY > 80); });
    });
  </script>
</body>
        </html>
