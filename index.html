  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = { 
      apiKey: "AIzaSyCHQvXHPyZbiqlhMsoDsSqkjrQ5wATj-Cw", 
      authDomain: "ecosdemoda-40202.firebaseapp.com", 
      projectId: "ecosdemoda-40202", 
      storageBucket: "ecosdemoda-40202.firebasestorage.app", 
      messagingSenderId: "1077783413744", 
      appId: "1:1077783413744:web:bebfb4f7956f6472709335" 
    };
    
    const app = initializeApp(firebaseConfig); 
    const auth = getAuth(app); 
    const db = getFirestore(app);

    let storeData = { sections: [] }, isLoggedIn = false, currentAdminPage = 'dashboard', activeSectionTab = -1, adminSelectedSection = 0, cart = [], editingSectionId = null, editingProductId = null, editingProductSectionId = null;
    let initialLoadDone = false; 

    const DEFAULT_DATA = {
      storeName: 'Ecos de Moda', heroSubtitle: 'Tienda de Regalos', heroTitle: 'Ecos de Moda',
      backgroundColor: '#FFFAFC', headerColor: '#1A1A1A', accentColor: '#E91E8C',
      whatsappNumber: '53000000', exchangeRate: 300,
      sections: [
        { id: 1, name: 'Cumpleaños', icon: 'fas fa-birthday-cake', products: [ { id: 1, name: 'Set de Velas', priceCUP: 3000, quantity: 5, image: 'https://picsum.photos/seed/vela01/400/400' } ] },
        { id: 2, name: 'Bodas', icon: 'fas fa-ring', products: [ { id: 2, name: 'Set de Copas', priceCUP: 7500, quantity: 2, image: 'https://picsum.photos/seed/copas05/400/400' } ] }
      ]
    };

    function sanitizeData() { if (!storeData.sections) storeData.sections = []; storeData.exchangeRate = Number(storeData.exchangeRate) || 300; storeData.sections.forEach(s => { if (!s.products) s.products = []; s.id = Number(s.id); s.products.forEach(p => { p.id = Number(p.id); if (p.price !== undefined && p.priceCUP === undefined) { p.priceCUP = Math.round(Number(p.price) * (storeData.exchangeRate || 300)); delete p.price; } p.priceCUP = Number(p.priceCUP) || 0; p.quantity = Number(p.quantity) || 10; }); }); }

    function initDatabase() { 
      onSnapshot(doc(db, "store", "data"), (d) => { 
        if (d.exists()) { 
          storeData = d.data(); 
          sanitizeData(); 
          applyAppearance(); 
          renderCatalog(); 
          if (document.getElementById('adminModal').classList.contains('visible')) window.showAdminPage(currentAdminPage); 
        } else { 
          if (!initialLoadDone) { 
            storeData = JSON.parse(JSON.stringify(DEFAULT_DATA)); 
            saveData(); 
          } 
        } 
        initialLoadDone = true;
      }, (error) => { 
        console.error("Error Firebase:", error); 
        showToast('Error de conexión', 'error'); 
      }); 
    }
    
    async function saveData() { try { await setDoc(doc(db, "store", "data"), JSON.parse(JSON.stringify(storeData))); } catch (e) { console.error(e); if (e.message.includes("maximum size")) showToast('Documento muy grande. Usa imágenes más ligeras.', 'error'); else showToast('Error al guardar. ¿Iniciaste sesión?', 'error'); } }

    function initAuth() { onAuthStateChanged(auth, (u) => { isLoggedIn = !!u; document.getElementById('navAdmin').querySelector('i').className = isLoggedIn ? 'fas fa-unlock text-fuchsia' : 'fas fa-lock'; }); }
    async function handleLogin() { try { await signInWithEmailAndPassword(auth, document.getElementById('loginUser').value, document.getElementById('loginPass').value); closeAllModals(); openAdminPanel('dashboard'); } catch (e) { document.getElementById('loginError').classList.remove('hidden'); } }
    async function handleLogout() { await signOut(auth); closeAllModals(); showToast('Sesión cerrada', 'info'); }

    function applyAppearance() { document.documentElement.style.setProperty('--bg', storeData.backgroundColor || '#FFFAFC'); document.documentElement.style.setProperty('--fg', storeData.headerColor || '#1A1A1A'); document.documentElement.style.setProperty('--accent', storeData.accentColor || '#E91E8C'); document.body.style.background = storeData.backgroundColor; document.body.style.color = storeData.headerColor; document.getElementById('heroTitle').textContent = storeData.heroTitle || 'Ecos de Moda'; document.getElementById('heroSubtitle').textContent = storeData.heroSubtitle || 'Tienda de Regalos'; }
    function getUSD(priceCUP) { return Number(priceCUP) / (Number(storeData.exchangeRate) || 300); }
    function formatPrice(priceCUP) { return `${getUSD(priceCUP).toFixed(2)} USD <span class="text-xs text-drift font-normal">| ${Math.round(Number(priceCUP)).toLocaleString()} CUP</span>`; }

    function compressAndProcessImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject('Error leyendo archivo');
        reader.onload = (event) => {
          const img = new Image();
          img.onerror = () => reject('Imagen corrupta');
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX = 500; let w = img.width, h = img.height;
            if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } } else { if (h > MAX) { w *= MAX / h; h = MAX; } }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            let quality = 0.7;
            let dataUrl = canvas.toDataURL('image/jpeg', quality);
            while (dataUrl.length > 750000 && quality > 0.3) { quality -= 0.1; dataUrl = canvas.toDataURL('image/jpeg', quality); }
            resolve(dataUrl);
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    window.openLightbox = function(src) { document.getElementById('lightboxImg').src = src; document.getElementById('lightbox').classList.add('active'); };
    window.closeLightbox = function() { document.getElementById('lightbox').classList.remove('active'); };

    function switchScreen(screen) {
      document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
      if (screen === 'catalog') { document.getElementById('navCatalog').classList.add('active'); window.scrollTo({top:0, behavior:'smooth'}); }
      else if (screen === 'cart') { document.getElementById('navCart').classList.add('active'); openModal('cartModal'); renderCartModal(); }
    }

    function renderCatalog() { 
      try {
        if (activeSectionTab >= storeData.sections.length) activeSectionTab = -1;
        const tC = document.getElementById('sectionTabs'), gC = document.getElementById('productGrid'), secs = storeData.sections || []; 
        let tH = `<button type="button" class="tab-btn ${activeSectionTab === -1 ? 'active' : ''}" onclick="window.setActiveTab(-1)">Todos</button>`; 
        secs.forEach((s, i) => { if(!s) return; tH += `<button type="button" class="tab-btn ${activeSectionTab === i ? 'active' : ''}" onclick="window.setActiveTab(${i})"><i class="${s.icon || 'fas fa-gift'} mr-1"></i>${s.name || ''}</button>`; }); 
        tC.innerHTML = tH; 
        let pH = ''; 
        const showS = activeSectionTab === -1 ? secs : (secs[activeSectionTab] ? [secs[activeSectionTab]] : secs); 
        showS.forEach(s => { 
          if (!s || !s.products) return; 
          if (activeSectionTab === -1 && secs.length > 1) pH += `<div class="col-span-2 mt-4 mb-1"><h3 class="font-display text-lg font-bold"><i class="${s.icon || ''} mr-2" style="color:var(--accent)"></i>${s.name || ''}</h3></div>`; 
          s.products.forEach(p => { 
            if(!p) return;
            const qty = Number(p.quantity) || 0; const isAvailable = qty > 0; const imgSrc = p.image || 'https://picsum.photos/seed/default/400/400';
            pH += `
              <article class="product-card shadow-md border border-sand/50 flex flex-col">
                <div class="overflow-hidden h-40 bg-sand/20 cursor-zoom-in" onclick="window.openLightbox('${imgSrc}')">
                  <img src="${imgSrc}" alt="${p.name || ''}" class="w-full h-full object-cover" loading="lazy">
                </div>
                <div class="p-3 flex flex-col flex-grow">
                  <h4 class="font-display text-sm font-bold mb-1 leading-tight" style="color:var(--fg)">${p.name || ''}</h4>
                  <p class="text-[11px] ${isAvailable ? 'text-green-600' : 'text-red-500'} font-semibold mb-1">
                    ${isAvailable ? `<i class="fas fa-check-circle mr-1"></i>Disp: ${qty}` : '<i class="fas fa-times-circle mr-1"></i>Agotado'}
                  </p>
                  <p class="text-sm font-bold mb-3" style="color:var(--accent)">${formatPrice(p.priceCUP || 0)}</p>
                  <div class="mt-auto">
                    ${isAvailable 
                      ? `<button type="button" onclick="window.addToCart(${s.id}, ${p.id})" class="w-full py-2 rounded-lg font-bold text-white text-xs active:scale-95 transition" style="background:var(--accent)"><i class="fas fa-bag-shopping mr-1"></i>Agregar</button>`
                      : `<button type="button" disabled class="w-full py-2 rounded-lg font-bold text-white bg-gray-400 cursor-not-allowed text-xs">Agotado</button>`
                    }
                  </div>
                </div>
              </article>`; 
          }); 
        }); 
        gC.innerHTML = pH || '<p class="col-span-2 text-center text-drift py-12">No hay productos.</p>'; 
      } catch(e) { console.error("Error render:", e); }
    }
    
    window.setActiveTab = function(i) { activeSectionTab = i; renderCatalog(); };

    window.addToCart = function(sId, pId) { 
      const s = storeData.sections.find(x => x.id === Number(sId)); if(!s) return;
      const p = s.products.find(x => x.id === Number(pId)); if(!p) return;
      const qty = Number(p.quantity) || 0; const currentInCart = cart.find(x => x.id === p.id)?.quantity || 0;
      if (currentInCart >= qty) { showToast('No hay más unidades', 'error'); return; }
      const e = cart.find(x => x.id === p.id); 
      if (e) e.quantity++; else cart.push({ id: p.id, name: p.name, priceCUP: Number(p.priceCUP) || 0, image: p.image, quantity: 1 }); 
      updateCartBadge(); showToast('Añadido', 'success'); 
    }
    window.removeFromCart = function(pId) { cart = cart.filter(x => x.id !== pId); renderCartModal(); updateCartBadge(); }
    window.updateQuantity = function(pId, d) { const i = cart.find(x => x.id === pId); if (!i) return; i.quantity += d; if (i.quantity <= 0) { removeFromCart(pId); return; } renderCartModal(); updateCartBadge(); }
    function updateCartBadge() { const t = cart.reduce((s, i) => s + i.quantity, 0), b = document.getElementById('cartBadge'); if (t > 0) { b.textContent = t; b.classList.remove('hidden'); } else b.classList.add('hidden'); }
    function renderCartModal() { const cI = document.getElementById('cartItems'), cF = document.getElementById('checkoutForm'); if (cart.length === 0) { cI.innerHTML = '<p class="text-center text-drift py-8">Tu carrito está vacío</p>'; cF.classList.add('hidden'); return; } let h = '', tCUP = 0; cart.forEach(i => { const subCUP = (Number(i.priceCUP) || 0) * i.quantity; tCUP += subCUP; h += `<div class="flex gap-3 items-center border-b border-sand pb-3"><img src="${i.image || ''}" class="w-14 h-14 rounded-lg object-cover"><div class="flex-grow"><h4 class="font-bold text-sm">${i.name || ''}</h4><p class="text-xs" style="color:var(--accent)">${formatPrice(i.priceCUP || 0)}</p></div><div class="flex items-center gap-2"><button type="button" onclick="window.updateQuantity(${i.id}, -1)" class="w-7 h-7 rounded-full bg-sand flex items-center justify-center text-xs">-</button><span class="font-bold w-4 text-center text-sm">${i.quantity}</span><button type="button" onclick="window.updateQuantity(${i.id}, 1)" class="w-7 h-7 rounded-full bg-sand flex items-center justify-center text-xs">+</button></div></div>`; }); h += `<div class="pt-4 text-right font-bold text-lg">Total: ${getUSD(tCUP).toFixed(2)} USD | ${Math.round(tCUP).toLocaleString()} CUP</div>`; cI.innerHTML = h; cF.classList.remove('hidden'); }
    
    function sendWhatsappOrder() { 
      const name = document.getElementById('checkName').value.trim(), address = document.getElementById('checkAddress').value.trim(), payment = document.getElementById('checkPayment').value, notes = document.getElementById('checkNotes').value.trim(); 
      if (!name || !address) { showToast('Completa nombre y dirección', 'error'); return; } 
      let msg = `🛒 *Pedido de ${storeData.storeName}*\n\n👤 *Cliente:* ${name}\n📍 *Dirección:* ${address}\n💳 *Pago:* ${payment}\n`; 
      if (notes) msg += `📝 *Notas:* ${notes}\n`; msg += `\n📦 *Productos:*\n`; 
      let tCUP = 0; 
      cart.forEach(i => { const subCUP = (Number(i.priceCUP) || 0) * i.quantity; tCUP += subCUP; msg += `  • ${i.name} x${i.quantity} — ${getUSD(subCUP).toFixed(2)} USD\n`; 
        for(let s of storeData.sections) { const p = s.products.find(x => x.id === i.id); if(p) { p.quantity = Math.max(0, (Number(p.quantity) || 0) - i.quantity); } } 
      }); 
      msg += `\n💰 *Total: ${getUSD(tCUP).toFixed(2)} USD | ${Math.round(tCUP).toLocaleString()} CUP*`; 
      saveData(); 
      window.open(`https://wa.me/${(storeData.whatsappNumber || '').replace(/[^0-9]/g, '')}?text=${encodeURIComponent(msg)}`, '_blank'); 
      cart = []; updateCartBadge(); closeAllModals(); 
    }

    function openModal(id) { document.getElementById(id).classList.add('visible'); if (id === 'cartModal') renderCartModal(); }
    function closeAllModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('visible')); }
    function openAdminPanel(page) { openModal('adminModal'); window.showAdminPage(page); }
    function handleAdminClick() { isLoggedIn ? openAdminPanel('dashboard') : openModal('loginModal'); }
    let toastTimer; function showToast(msg, type) { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast ' + type; clearTimeout(toastTimer); setTimeout(() => t.classList.add('show'), 10); toastTimer = setTimeout(() => t.classList.remove('show'), 2500); }

    function showAdminPage(pg) { currentAdminPage = pg; editingSectionId = null; editingProductId = null; document.querySelectorAll('.admin-tab').forEach(b => { const isActive = b.dataset.page === pg; b.classList.toggle('bg-fuchsia/20', isActive); b.classList.toggle('text-fuchsia', isActive); b.classList.toggle('text-gray-300', !isActive); }); const c = document.getElementById('adminContent'); if (pg === 'dashboard') renderDashboard(c); else if (pg === 'sections') renderSectionList(c); else if (pg === 'products') renderProductList(c); else if (pg === 'appearance') renderAppearance(c); else if (pg === 'settings') renderSettings(c); }
    window.showAdminPage = showAdminPage;

    function renderDashboard(el) { let t = 0; storeData.sections.forEach(s => t += (s.products || []).length); el.innerHTML = `<div class="grid grid-cols-2 gap-4"><div class="bg-adminCard rounded-xl p-5 border border-gray-700"><p class="text-gray-400 text-xs">Secciones</p><p class="text-2xl font-bold text-fuchsia">${storeData.sections.length}</p></div><div class="bg-adminCard rounded-xl p-5 border border-gray-700"><p class="text-gray-400 text-xs">Productos</p><p class="text-2xl font-bold">${t}</p></div></div>`; }

    function renderSectionList(el) { let l = ''; storeData.sections.forEach(s => { l += `<div class="bg-adminCard rounded-xl p-4 border border-gray-700 flex justify-between items-center gap-3"><div class="flex items-center gap-3"><i class="${s.icon || 'fas fa-gift'} text-fuchsia"></i><span class="font-bold text-sm">${s.name || ''}</span></div><div class="flex gap-2"><button type="button" onclick="window.renderSectionForm(${s.id})" class="px-3 py-2 rounded-lg bg-gray-700 font-bold text-xs">Editar</button><button type="button" onclick="window.deleteSection(${s.id})" class="px-3 py-2 rounded-lg bg-red-900/30 text-red-400 font-bold text-xs">Eliminar</button></div></div>`; }); el.innerHTML = `<div class="mb-4"><button type="button" onclick="window.renderSectionForm(null)" class="w-full px-4 py-3 rounded-xl font-bold text-white text-sm" style="background:var(--accent)"><i class="fas fa-plus mr-2"></i>Nueva Sección</button></div><div class="space-y-3">${l}</div>`; }
    window.renderSectionForm = function(id) { editingSectionId = id; const s = id ? storeData.sections.find(x => x.id === Number(id)) : null; const c = document.getElementById('adminContent'); c.innerHTML = `<button type="button" onclick="window.showAdminPage('sections')" class="text-drift hover:text-white mb-4 inline-flex items-center gap-2 text-sm"><i class="fas fa-arrow-left"></i> Volver</button><h3 class="font-display text-lg font-bold mb-4">${s ? 'Editar' : 'Nueva'} Sección</h3><div class="space-y-3"><div><label class="block text-xs text-gray-400 mb-1">Nombre *</label><input id="sf_name" type="text" value="${s ? s.name : ''}" class="admin-input"></div><div><label class="block text-xs text-gray-400 mb-1">Icono</label><input id="sf_icon" type="text" value="${s ? s.icon : 'fas fa-gift'}" class="admin-input"></div><button type="button" onclick="window.saveSection()" class="w-full py-3 rounded-xl font-bold text-white text-sm" style="background:var(--accent)">Guardar</button></div>`; };
    window.saveSection = async function() { const name = document.getElementById('sf_name').value.trim(), icon = document.getElementById('sf_icon').value.trim() || 'fas fa-gift'; if (!name) { showToast('Nombre obligatorio', 'error'); return; } if (editingSectionId) { const s = storeData.sections.find(x => x.id === Number(editingSectionId)); if (s) { s.name = name; s.icon = icon; } } else { storeData.sections.push({ id: Date.now(), name, icon, products: [] }); } await saveData(); showToast('Guardada', 'success'); window.showAdminPage('sections'); };
    window.deleteSection = async function(id) { if (!confirm('¿Eliminar sección y sus productos?')) return; storeData.sections = storeData.sections.filter(x => x.id !== Number(id)); await saveData(); window.showAdminPage('sections'); };

    function renderProductList(el) { if (storeData.sections.length === 0) { el.innerHTML = `<div class="text-center py-8 text-gray-400"><p class="text-sm">Crea una sección primero.</p><button type="button" onclick="window.showAdminPage('sections')" class="mt-3 px-4 py-2 rounded-lg bg-gray-700 font-bold text-xs">Ir a Secciones</button></div>`; return; } if (adminSelectedSection >= storeData.sections.length) adminSelectedSection = 0; let sH = ''; storeData.sections.forEach((s, i) => { sH += `<option value="${i}" ${adminSelectedSection === i ? 'selected' : ''}>${s.name || ''}</option>`; }); const sec = storeData.sections[adminSelectedSection]; let pH = ''; if(sec && sec.products) { sec.products.forEach(p => { if(!p) return; pH += `<div class="bg-adminCard rounded-xl border border-gray-700 overflow-hidden"><img src="${p.image || 'https://picsum.photos/seed/default/400/400'}" class="w-full h-24 object-cover bg-sand/20"><div class="p-3"><h4 class="font-bold text-xs truncate">${p.name || ''}</h4><p class="text-fuchsia text-xs">${formatPrice(p.priceCUP || 0)}</p><p class="text-[10px] mt-1 ${(Number(p.quantity)||0) > 0 ? 'text-green-400' : 'text-red-400'}"><i class="fas fa-boxes-stacked mr-1"></i>Stock: ${Number(p.quantity)||0}</p><div class="flex gap-2 mt-2"><button type="button" onclick="window.renderProductForm(${sec.id}, ${p.id})" class="flex-1 py-1.5 rounded-lg bg-gray-700 font-bold text-[11px]">Editar</button><button type="button" onclick="window.deleteProduct(${sec.id}, ${p.id})" class="flex-1 py-1.5 rounded-lg bg-red-900/30 text-red-400 font-bold text-[11px]">Eliminar</button></div></div></div>`; }); } el.innerHTML = `<div class="flex flex-col gap-3 mb-4"><select id="adminSectionSelect" class="admin-input text-sm">${sH}</select><button type="button" onclick="window.renderProductForm(${sec.id}, null)" class="w-full px-4 py-3 rounded-xl font-bold text-white text-sm" style="background:var(--accent)"><i class="fas fa-plus mr-2"></i>Nuevo Producto</button></div><div class="grid grid-cols-2 gap-3">${pH}</div>`; setTimeout(() => { const sel = document.getElementById('adminSectionSelect'); if(sel) sel.onchange = function() { adminSelectedSection = parseInt(this.value); renderProductList(document.getElementById('adminContent')); }; }, 50); }

    window.renderProductForm = function(secId, prodId) {
      editingProductSectionId = secId; editingProductId = prodId;
      const s = storeData.sections.find(x => x.id === Number(secId));
      const p = prodId ? s?.products.find(x => x.id === Number(prodId)) : null;
      const qty = p ? (Number(p.quantity) || 0) : 10; const priceCUP = p ? (Number(p.priceCUP) || 0) : 0;
      const rate = Number(storeData.exchangeRate) || 300;
      const c = document.getElementById('adminContent');
      c.innerHTML = `
        <button type="button" onclick="window.showAdminPage('products')" class="text-drift hover:text-white mb-4 inline-flex items-center gap-2 text-sm"><i class="fas fa-arrow-left"></i> Volver</button>
        <h3 class="font-display text-lg font-bold mb-4">${p ? 'Editar' : 'Nuevo'} Producto <span class="text-xs text-gray-400 font-normal">(${s.name || ''})</span></h3>
        <div class="space-y-3">
          <div><label class="block text-xs text-gray-400 mb-1">Nombre *</label><input id="pf_name" type="text" value="${p ? p.name : ''}" class="admin-input"></div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs text-gray-400 mb-1">Precio (CUP) *</label>
              <input id="pf_priceCUP" type="number" min="0" step="1" value="${priceCUP}" class="admin-input" oninput="document.getElementById('pf_usd_preview').textContent = (Number(this.value)/${rate}).toFixed(2)">
              <p class="text-[10px] text-gray-500 mt-1">≈ <span id="pf_usd_preview">${getUSD(priceCUP).toFixed(2)}</span> USD</p>
            </div>
            <div><label class="block text-xs text-gray-400 mb-1">Stock *</label><input id="pf_quantity" type="number" min="0" value="${qty}" class="admin-input"></div>
          </div>
          <div>
            <label class="block text-xs text-gray-400 mb-1">Imagen</label>
            <img id="pf_img_preview" src="${p ? p.image : ''}" class="w-full h-28 object-contain rounded-xl mb-2 bg-sand/20 ${p && p.image ? '' : 'hidden'}">
            <input id="pf_file" type="file" accept="image/*" class="w-full text-white text-sm file:mr-2 file:py-1 file:px-3 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-pink-50 file:text-pink-700">
            <input id="pf_image_url" type="hidden" value="${p ? p.image : ''}">
          </div>
          <button type="button" id="saveProductBtn" onclick="window.saveProduct()" class="w-full py-3 rounded-xl font-bold text-white text-sm" style="background:var(--accent)">Guardar Producto</button>
        </div>`;
      setTimeout(() => { const f = document.getElementById('pf_file'); if(f) f.onchange = (e) => { const file = e.target.files[0]; if (file) { const r = new FileReader(); r.onload = (ev) => { document.getElementById('pf_img_preview').src = ev.target.result; document.getElementById('pf_img_preview').classList.remove('hidden'); }; r.readAsDataURL(file); } }; }, 50);
    };

    window.saveProduct = async function() {
      const name = document.getElementById('pf_name').value.trim(); const priceCUP = Number(document.getElementById('pf_priceCUP').value) || 0; const quantity = Number(document.getElementById('pf_quantity').value) || 0;
      const file = document.getElementById('pf_file').files[0]; const btn = document.getElementById('saveProductBtn');
      if (!name) { showToast('Nombre obligatorio', 'error'); return; }
      if (priceCUP <= 0) { showToast('Precio CUP > 0', 'error'); return; }
      let imageUrl = document.getElementById('pf_image_url').value;
      if (file) { btn.disabled = true; btn.innerHTML = '<span class="upload-spinner mr-2"></span> Procesando...'; try { imageUrl = await compressAndProcessImage(file); } catch (e) { showToast('Error imagen', 'error'); btn.disabled = false; btn.innerHTML = 'Guardar'; return; } }
      const s = storeData.sections.find(x => x.id === Number(editingProductSectionId)); if (!s) return; if (!s.products) s.products = [];
      if (editingProductId) { const p = s.products.find(x => x.id === Number(editingProductId)); if (p) { p.name = name; p.priceCUP = priceCUP; p.quantity = quantity; p.image = imageUrl; delete p.price; } } 
      else { s.products.push({ id: Date.now(), name, priceCUP, quantity, image: imageUrl || `https://picsum.photos/seed/${Date.now()}/400/400` }); }
      await saveData(); showToast('Guardado', 'success'); window.showAdminPage('products'); renderCatalog(); 
    };

    window.deleteProduct = async function(secId, prodId) { if (!confirm('¿Eliminar?')) return; const s = storeData.sections.find(x => x.id === Number(secId)); if (s && s.products) { s.products = s.products.filter(x => x.id !== Number(prodId)); await saveData(); showToast('Eliminado', 'success'); renderProductList(document.getElementById('adminContent')); renderCatalog(); } };

    function renderAppearance(el) { el.innerHTML = `<div class="space-y-4"><div class="bg-adminCard rounded-xl p-4 border border-gray-700 space-y-4"><h3 class="font-display text-sm font-bold text-fuchsia">Textos y Colores</h3><div><label class="block text-xs text-gray-400 mb-1">Nombre</label><input id="ap_storeName" type="text" value="${storeData.storeName || ''}" class="admin-input"></div><div><label class="block text-xs text-gray-400 mb-1">Título Hero</label><input id="ap_heroTitle" type="text" value="${storeData.heroTitle || ''}" class="admin-input"></div><div><label class="block text-xs text-gray-400 mb-1">Subtítulo Hero</label><input id="ap_heroSubtitle" type="text" value="${storeData.heroSubtitle || ''}" class="admin-input"></div><div class="grid grid-cols-3 gap-3"><div><label class="block text-xs text-gray-400 mb-1">Fondo</label><input id="ap_bgColor" type="color" value="${storeData.backgroundColor || '#FFFAFC'}" class="w-full h-10 rounded cursor-pointer bg-transparent border-0"></div><div><label class="block text-xs text-gray-400 mb-1">Texto</label><input id="ap_headerColor" type="color" value="${storeData.headerColor || '#1A1A1A'}" class="w-full h-10 rounded cursor-pointer bg-transparent border-0"></div><div><label class="block text-xs text-gray-400 mb-1">Acento</label><input id="ap_accentColor" type="color" value="${storeData.accentColor || '#E91E8C'}" class="w-full h-10 rounded cursor-pointer bg-transparent border-0"></div></div></div><button type="button" onclick="window.saveAppearance()" class="w-full py-3 rounded-xl font-bold text-white text-sm" style="background:var(--accent)">Guardar</button></div>`; }
    window.saveAppearance = async function() { storeData.storeName = document.getElementById('ap_storeName').value.trim(); storeData.heroTitle = document.getElementById('ap_heroTitle').value.trim(); storeData.heroSubtitle = document.getElementById('ap_heroSubtitle').value.trim(); storeData.backgroundColor = document.getElementById('ap_bgColor').value; storeData.headerColor = document.getElementById('ap_headerColor').value; storeData.accentColor = document.getElementById('ap_accentColor').value; await saveData(); showToast('Guardado', 'success'); };

    function renderSettings(el) { el.innerHTML = `<div class="space-y-4"><div class="bg-adminCard rounded-xl p-4 border border-gray-700 space-y-4"><h3 class="font-display text-sm font-bold text-fuchsia">Ventas y WhatsApp</h3><div><label class="block text-xs text-gray-400 mb-1">Número de WhatsApp</label><input id="st_whatsapp" type="text" value="${storeData.whatsappNumber || ''}" class="admin-input"></div><div><label class="block text-xs text-gray-400 mb-1">1 USD = ? CUP</label><input id="st_exchange" type="number" value="${storeData.exchangeRate || 300}" class="admin-input"></div></div><button type="button" onclick="window.saveSettings()" class="w-full py-3 rounded-xl font-bold text-white text-sm" style="background:var(--accent)">Guardar</button></div>`; }
    window.saveSettings = async function() { storeData.whatsappNumber = document.getElementById('st_whatsapp').value.trim(); storeData.exchangeRate = Number(document.getElementById('st_exchange').value) || 300; await saveData(); showToast('Guardado', 'success'); renderCatalog(); };

    // DECLARACIONES GLOBALES PARA QUE EL HTML PUEDA LEERLAS
    window.closeAllModals = closeAllModals;
    window.switchScreen = switchScreen;
    window.handleAdminClick = handleAdminClick;

    document.addEventListener('DOMContentLoaded', () => {
      initAuth(); initDatabase();
      document.getElementById('loginBtn').addEventListener('click', handleLogin);
      document.getElementById('adminLogout').addEventListener('click', handleLogout);
      document.getElementById('sendWhatsapp').addEventListener('click', sendWhatsappOrder);
      document.querySelectorAll('.modal-overlay').forEach(o => { o.addEventListener('click', function(e) { if (e.target === o) closeAllModals(); }); });
      window.addEventListener('keydown', (e) => { if (e.key === 'Escape') window.closeLightbox(); });
    });
            </script>
