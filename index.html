<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecos de Moda — Tienda de Regalos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { blush: '#FFFAFC', charcoal: '#1A1A1A', fuchsia: '#E91E8C', deepFuchsia: '#C2185B', sand: '#F3E5F5', drift: '#6B7280', admin: '#111827', adminCard: '#1F2937' },
          fontFamily: { display: ['Playfair Display', 'serif'], body: ['Lato', 'sans-serif'] }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root { --bg: #FFFAFC; --fg: #1A1A1A; --accent: #E91E8C; --accent2: #C2185B; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Lato', sans-serif; background: var(--bg); color: var(--fg); overflow-x: hidden; }
    .font-display { font-family: 'Playfair Display', serif; }
    .float-shape { position: absolute; border-radius: 50%; pointer-events: none; animation: floatUp 8s ease-in-out infinite; background: rgba(255,255,255,0.9); box-shadow: 0 8px 25px rgba(233, 30, 140, 0.2); display: flex; align-items: center; justify-content: center; padding: 20%; }
    .float-shape img { width: 100%; height: 100%; object-fit: contain; }
    @keyframes floatUp { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-30px) scale(1.05); } }
    .product-card { transition: transform 0.3s, box-shadow 0.3s; }
    .product-card:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(233, 30, 140, 0.15); }
    .tab-btn { transition: all 0.3s; border-bottom: 3px solid transparent; }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }
    .nav-scrolled { background: rgba(255,250,252,0.95) !important; backdrop-filter: blur(12px); box-shadow: 0 2px 20px rgba(233, 30, 140, 0.08); }
    .modal-overlay { position: fixed; inset: 0; z-index: 1100; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .modal-overlay.visible { opacity: 1; pointer-events: all; }
    .modal-box { transform: translateY(20px); transition: transform 0.3s; width: 95%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .modal-overlay.visible .modal-box { transform: translateY(0); }
    .toast { position: fixed; bottom: 30px; right: 30px; z-index: 2100; padding: 14px 24px; border-radius: 12px; color: #fff; font-weight: 600; transform: translateY(100px); opacity: 0; transition: all 0.4s; pointer-events: none; max-width: 90%; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #16a34a; } .toast.error { background: #dc2626; } .toast.info { background: var(--accent); }
    .admin-scroll::-webkit-scrollbar { width: 6px; } .admin-scroll::-webkit-scrollbar-thumb { background: #4B5563; border-radius: 3px; }
    .badge-cart { position: absolute; top: -5px; right: -5px; background: var(--accent); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
  </style>
</head>
<body>

  <nav id="mainNav" class="fixed top-0 left-0 right-0 z-50 transition-all">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="#heroSection" class="font-display text-2xl font-bold tracking-tight" id="navTitle" style="color:var(--fg)">Ecos de Moda</a>
      <div class="flex items-center gap-6">
        <button id="cartBtn" type="button" class="relative text-xl hover:text-fuchsia transition-colors"><i class="fas fa-shopping-bag"></i><span id="cartBadge" class="badge-cart hidden">0</span></button>
        <button id="adminFab" type="button" class="text-sm text-drift hover:text-fuchsia transition-colors"><i class="fas fa-lock"></i></button>
      </div>
    </div>
  </nav>

  <main id="publicSite">
    <section id="heroSection" class="relative min-h-screen flex items-center justify-center overflow-hidden">
      <img src="https://ecosdemoda.github.io/Ecos-de-Moda/logo.png" class="absolute right-0 bottom-0 h-[60%] md:h-[85%] object-contain opacity-10 pointer-events-none" style="mask-image: linear-gradient(to left, black 40%, transparent 100%); -webkit-mask-image: linear-gradient(to left, black 40%, transparent 100%);" alt="Silueta">
      <div class="float-shape w-24 h-24 md:w-36 md:h-36" style="top:12%;left:8%"><img src="https://ecosdemoda.github.io/Ecos-de-Moda/logo.png" alt="Logo"></div>
      <div class="float-shape w-20 h-20 md:w-28 md:h-28" style="top:60%;left:12%"><img src="https://ecosdemoda.github.io/Ecos-de-Moda/logo.png" alt="Logo"></div>
      <div class="float-shape w-28 h-28 md:w-40 md:h-40" style="top:25%;right:25%"><img src="https://ecosdemoda.github.io/Ecos-de-Moda/logo.png" alt="Logo"></div>
      <div class="relative z-10 text-center px-6 max-w-4xl">
        <p id="heroSubtitle" class="text-fuchsia uppercase tracking-[0.4em] text-sm mb-4 font-bold">Tienda de Regalos</p>
        <h1 id="heroTitle" class="font-display text-5xl md:text-7xl lg:text-8xl font-black leading-tight mb-8" style="color:var(--fg)">Ecos de Moda</h1>
        <a href="#catalogSection" class="inline-block px-10 py-4 rounded-full font-bold text-white text-lg hover:shadow-lg hover:scale-105 transition" style="background:var(--accent)">Ver Catálogo</a>
      </div>
    </section>
    
    <section id="catalogSection" class="py-20 px-6">
      <div class="max-w-7xl mx-auto">
        <div class="text-center mb-12"><h2 class="font-display text-4xl md:text-5xl font-bold mb-4" style="color:var(--fg)">Nuestro Catálogo</h2></div>
        <div id="sectionTabs" class="flex flex-wrap justify-center gap-2 mb-10"></div>
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
      </div>
    </section>
  </main>
  <footer class="py-10 px-6 text-center" style="background:var(--fg)"><p id="footerName" class="font-display text-white text-xl font-bold">Ecos de Moda</p></footer>

  <!-- CARRITO -->
  <div id="cartModal" class="modal-overlay">
    <div class="modal-box bg-white rounded-2xl p-6 mx-4 shadow-2xl">
      <div class="flex justify-between items-center mb-6"><h3 class="font-display text-2xl font-bold text-bark">Mi Carrito</h3><button type="button" onclick="window.closeAllModals()" class="text-drift text-xl"><i class="fas fa-times"></i></button></div>
      <div id="cartItems" class="space-y-4 mb-6"></div>
      <div id="checkoutForm" class="space-y-4 border-t border-sand pt-6 hidden">
        <input type="text" id="checkName" placeholder="Tu nombre" class="w-full px-4 py-3 rounded-xl border border-sand outline-none">
        <input type="text" id="checkAddress" placeholder="Dirección" class="w-full px-4 py-3 rounded-xl border border-sand outline-none">
        <select id="checkPayment" class="w-full px-4 py-3 rounded-xl border border-sand outline-none bg-white"><option value="Efectivo">Efectivo</option><option value="Transferencia">Transferencia</option></select>
        <textarea id="checkNotes" rows="2" placeholder="Notas" class="w-full px-4 py-3 rounded-xl border border-sand outline-none resize-none"></textarea>
        <p class="text-xs text-drift italic"><i class="fas fa-truck mr-1"></i> Mensajería aparte o recoger en tienda.</p>
        <button type="button" id="sendWhatsapp" class="w-full py-4 rounded-xl font-bold text-white text-lg bg-green-600 hover:bg-green-700 flex items-center justify-center gap-2"><i class="fab fa-whatsapp text-2xl"></i> Enviar Pedido</button>
      </div>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="loginModal" class="modal-overlay"><div class="modal-box bg-white rounded-2xl p-8 mx-4 shadow-2xl"><h3 class="font-display text-2xl font-bold text-bark mb-4 text-center">Acceso Admin</h3><div class="space-y-4"><input id="loginUser" type="email" class="w-full px-4 py-4 rounded-xl border border-sand outline-none text-lg" placeholder="Email"><input id="loginPass" type="password" class="w-full px-4 py-4 rounded-xl border border-sand outline-none text-lg" placeholder="Contraseña"><p id="loginError" class="text-red-500 text-sm hidden">Incorrecto</p><button type="button" id="loginBtn" class="w-full py-4 rounded-xl font-bold text-white text-lg" style="background:var(--accent)">Iniciar</button><button type="button" onclick="window.closeAllModals()" class="w-full py-4 rounded-xl font-bold text-drift border border-sand">Cancelar</button></div></div></div>

  <!-- ADMIN -->
  <div id="adminModal" class="modal-overlay">
    <div class="modal-box bg-admin text-white flex flex-col md:rounded-2xl shadow-2xl" style="max-width:1000px; width:100%; height:100vh; max-height:100vh; margin:0;">
      <header class="p-4 border-b border-gray-700 flex justify-between items-center shrink-0">
        <h2 class="font-display text-xl font-bold text-fuchsia">Admin</h2>
        <button type="button" onclick="window.closeAllModals()" class="w-10 h-10 rounded-full hover:bg-gray-800 flex items-center justify-center"><i class="fas fa-times text-xl"></i></button>
      </header>
      <div class="flex flex-wrap gap-2 p-4 border-b border-gray-700 shrink-0">
        <button type="button" onclick="window.showAdminPage('sections')" class="admin-tab px-4 py-2 rounded-lg text-sm font-bold hover:bg-gray-700" data-page="sections"><i class="fas fa-layer-group mr-1"></i> Secciones</button>
        <button type="button" onclick="window.showAdminPage('products')" class="admin-tab px-4 py-2 rounded-lg text-sm font-bold hover:bg-gray-700" data-page="products"><i class="fas fa-boxes-stacked mr-1"></i> Productos</button>
        <button type="button" onclick="window.showAdminPage('settings')" class="admin-tab px-4 py-2 rounded-lg text-sm font-bold hover:bg-gray-700" data-page="settings"><i class="fas fa-cog mr-1"></i> Config</button>
      </div>
      <div id="adminContent" class="flex-1 overflow-y-auto admin-scroll p-8 md:p-10"></div>
      <footer class="p-4 border-t border-gray-700 shrink-0"><button type="button" id="adminLogout" class="w-full flex justify-center gap-3 py-3 rounded-xl hover:bg-red-900/30 text-red-400 font-bold"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button></footer>
    </div>
  </div>
  <div id="toast" class="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCHQvXHPyZbiqlhMsoDsSqkjrQ5wATj-Cw", authDomain: "ecosdemoda-40202.firebaseapp.com", projectId: "ecosdemoda-40202", storageBucket: "ecosdemoda-40202.firebasestorage.app", messagingSenderId: "1077783413744", appId: "1:1077783413744:web:bebfb4f7956f6472709335" };
    const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

    let storeData = { sections: [] }, isLoggedIn = false, currentAdminPage = 'sections', activeSectionTab = 0, adminSelectedSection = 0, cart = [];
    let editingSectionId = null, editingProductId = null, editingProductSectionId = null;

    const DEFAULT_DATA = { storeName: 'Ecos de Moda', heroSubtitle: 'Tienda de Regalos', heroTitle: 'Ecos de Moda', backgroundColor: '#FFFAFC', headerColor: '#1A1A1A', accentColor: '#E91E8C', whatsappNumber: '53000000', exchangeRate: 300, sections: [ { id: 1, name: 'Cumpleaños', icon: 'fas fa-birthday-cake', products: [ { id: 1, name: 'Set de Velas', price: 10.00, image: 'https://picsum.photos/seed/vela01/400/400' }, { id: 2, name: 'Chocolates', price: 15.50, image: 'https://picsum.photos/seed/choco02/400/400' } ] }, { id: 2, name: 'Bodas', icon: 'fas fa-ring', products: [ { id: 3, name: 'Set de Copas', price: 25.00, image: 'https://picsum.photos/seed/copas05/400/400' } ] } ] };

    function initDatabase() { onSnapshot(doc(db, "store", "data"), (d) => { if (d.exists()) { storeData = d.data(); if (!storeData.sections) storeData.sections = []; } else { storeData = JSON.parse(JSON.stringify(DEFAULT_DATA)); saveData(); } applyAppearance(); renderCatalog(); if (document.getElementById('adminModal').classList.contains('visible')) window.showAdminPage(currentAdminPage); }); }
    async function saveData() { try { await setDoc(doc(db, "store", "data"), storeData); } catch (e) { showToast('Error', 'error'); } }
    function initAuth() { onAuthStateChanged(auth, (u) => { isLoggedIn = !!u; updateAdminFab(); }); }
    async function handleLogin() { try { await signInWithEmailAndPassword(auth, document.getElementById('loginUser').value, document.getElementById('loginPass').value); closeAllModals(); openAdminPanel(); } catch (e) { document.getElementById('loginError').classList.remove('hidden'); } }
    async function handleLogout() { await signOut(auth); closeAllModals(); }

    function applyAppearance() { document.documentElement.style.setProperty('--bg', storeData.backgroundColor); document.documentElement.style.setProperty('--fg', storeData.headerColor); document.documentElement.style.setProperty('--accent', storeData.accentColor); document.body.style.background = storeData.backgroundColor; document.body.style.color = storeData.headerColor; document.getElementById('navTitle').textContent = storeData.storeName; document.getElementById('heroTitle').textContent = storeData.heroTitle; document.getElementById('heroSubtitle').textContent = storeData.heroSubtitle; document.getElementById('footerName').textContent = storeData.storeName; }
    function formatPrice(p) { return `${p.toFixed(2)} USD <span class="text-sm text-drift font-normal">| ${Math.round(p * (storeData.exchangeRate || 300)).toLocaleString()} CUP</span>`; }
    
    function renderCatalog() {
      const tC = document.getElementById('sectionTabs'), gC = document.getElementById('productGrid'), secs = storeData.sections || [];
      let tH = `<button type="button" class="tab-btn px-4 py-2 text-sm font-semibold rounded-t-lg ${activeSectionTab === -1 ? 'active' : ''}" onclick="window.setActiveTab(-1)">Todos</button>`;
      secs.forEach((s, i) => { tH += `<button type="button" class="tab-btn px-4 py-2 text-sm font-semibold rounded-t-lg ${activeSectionTab === i ? 'active' : ''}" onclick="window.setActiveTab(${i})"><i class="${s.icon} mr-1"></i>${s.name}</button>`; });
      tC.innerHTML = tH; 
      
      if(secs.length === 0) { gC.innerHTML = '<p class="col-span-full text-center text-drift py-20 text-xl">Aún no hay productos. ¡Agrega secciones desde el panel Admin!</p>'; return; }

      let pH = ''; const showS = activeSectionTab === -1 ? secs : (secs[activeSectionTab] ? [secs[activeSectionTab]] : secs);
      showS.forEach(s => { if (!s || !s.products) return; if (activeSectionTab === -1) pH += `<div class="col-span-full mt-6 mb-2"><h3 class="font-display text-2xl font-bold"><i class="${s.icon} mr-2" style="color:var(--accent)"></i>${s.name}</h3></div>`; s.products.forEach(p => { pH += `<article class="product-card bg-white rounded-2xl overflow-hidden shadow-md border border-sand/50 flex flex-col"><div class="overflow-hidden h-56"><img src="${p.image}" alt="${p.name}" class="w-full h-full object-cover" loading="lazy"></div><div class="p-5 flex flex-col flex-grow"><h4 class="font-display text-lg font-bold text-bark mb-1">${p.name}</h4><p class="text-xl font-bold mb-4" style="color:var(--accent)">${formatPrice(p.price)}</p><div class="mt-auto"><button type="button" onclick="window.addToCart(${s.id}, ${p.id})" class="w-full py-3 rounded-xl font-bold text-white hover:shadow-lg text-base" style="background:var(--accent)"><i class="fas fa-bag-shopping mr-2"></i>Agregar</button></div></
